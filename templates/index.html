<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyrene Control Hub</title>
  <!-- Load Vue 3 Global from Unpkg CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <!-- Load Tailwind CSS Play CDN for modern responsive utilities -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 flex flex-col min-h-screen">
  <div id="app" class="max-w-6xl mx-auto p-4 md:p-8 w-full flex-1">
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-10 border-b border-slate-800 pb-6">
      <div>
        <h1 class="text-2xl font-extrabold tracking-tight bg-gradient-to-r from-teal-400 to-emerald-400 bg-clip-text text-transparent">
          Cyrene Gateway Hub
        </h1>
        <p class="text-xs text-slate-500 mt-1 font-mono">Modern API Router & OAuth Hub</p>
      </div>
      <div class="flex items-center gap-2">
        <span class="flex h-2.5 w-2.5 relative">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
        </span>
        <span class="text-xs font-semibold text-slate-400 bg-slate-900 border border-slate-800 px-3 py-1 rounded-md">
          Go API Gateway Engine
        </span>
      </div>
    </header>

    <main class="grid gap-6 md:grid-cols-2">
      <!-- Status Card -->
      <section class="bg-slate-900/50 backdrop-blur border border-slate-800/80 p-6 rounded-xl shadow-xl">
        <h2 class="text-lg font-bold text-slate-200 mb-4 flex items-center gap-2">
          <span>🖥️</span> Gateway Core
        </h2>
        <div class="space-y-4">
          <div class="flex justify-between items-center text-sm border-b border-slate-800 pb-2">
            <span class="text-slate-400">Database Status</span>
            <span class="text-emerald-400 font-semibold font-mono">CONNECTED</span>
          </div>
          <div class="flex justify-between items-center text-sm">
            <span class="text-slate-400">Memory Footprint</span>
            <span class="text-slate-300 font-mono">&lt; 15 MB</span>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
