name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          # Only tag refs (v*) become the version; branch builds show "dev"
          if [[ "${GITHUB_REF_NAME}" == v* ]]; then VERSION="${GITHUB_REF_NAME}"; else VERSION="dev"; fi
          OUTPUT="cyrene-gateway-${{ matrix.suffix }}"
          go build -ldflags="-s -w -X github.com/arisvia/cyrene-gateway/internal/handler.version=${VERSION}" -o "$OUTPUT" ./cmd/gateway/
          echo "Built: $OUTPUT (${VERSION})"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: cyrene-gateway-${{ matrix.suffix }}
          path: cyrene-gateway-${{ matrix.suffix }}
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*
          generate_release_notes: true
